name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # create GitHub releases and upload assets
  id-token:  write     # required for attestation signing (OIDC)
  attestations: write  # required to write attestation records

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="dressage-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o "dist/${BINARY_NAME}" \
            ./cmd/dressage/
          echo "BINARY_NAME=${BINARY_NAME}" >> "$GITHUB_ENV"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          file: dist/${{ env.BINARY_NAME }}
          artifact-name: sbom-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json
          output-file: dist/sbom-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json
          format: spdx-json

      - name: Attest binary provenance
        id: attest-binary
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ env.BINARY_NAME }}

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/sbom-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
